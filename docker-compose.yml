version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: driver_control_db
    environment:
      POSTGRES_DB: driver_control
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d driver_control"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: driver_control_app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/driver_control
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
